name: Mirror GitHub to GitLab

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror all repositories
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GL_PAT: ${{ secrets.GL_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GL_USERNAME: ${{ secrets.GL_USERNAME }}
        run: |
          set -e

          # Function to log safely (hiding tokens)
          log() {
            echo "[$(date -u +'%Y-%m-%d %H:%M:%S')] $*" | sed -E "s|$GH_PAT|***|g; s|$GL_PAT|***|g"
          }

          log "Starting mirroring for user: $GH_USERNAME"

          # Get all repos (handles pagination)
          page=1
          while :; do
            repos=$(curl -s -H "Authorization: token $GH_PAT" \
              "https://api.github.com/user/repos?per_page=100&page=$page&type=all")
            
            # Stop if no more repos or error
            count=$(echo "$repos" | jq '. | length' 2>/dev/null || echo "0")
            if [ "$count" -eq 0 ]; then break; fi

            echo "$repos" | jq -r '.[] | "\(.name) \(.owner.login)"' | while read -r name owner; do
              # Skip if not the owner or if it's the mirror repo itself
              if [ "$owner" != "$GH_USERNAME" ] || [ "$name" == "repo_mirror" ]; then
                continue
              fi

              log "Processing: $name"

              # Create GitLab project (private) - ignore error if it already exists
              curl -s -X POST "https://gitlab.com/api/v4/projects" \
                -H "Authorization: Bearer $GL_PAT" \
                -H "Content-Type: application/json" \
                -d "{\"name\": \"$name\", \"visibility\": \"private\"}" > /dev/null

              # Clone mirror (quietly to avoid leaking metadata)
              # If clone fails (e.g. empty repo), we log and continue
              if git clone --mirror "https://$GH_USERNAME:$GH_PAT@github.com/$GH_USERNAME/$name.git" "$name.git" --quiet 2>/dev/null; then
                cd "$name.git"
                # Push mirror - we use || true to ensure one failure doesn't stop the whole job
                # (Common failures: LFS objects missing on GitLab, empty repos, or size limits)
                if ! git push --mirror "https://oauth2:$GL_PAT@gitlab.com/$GL_USERNAME/$name.git" --quiet 2>/dev/null; then
                  log "Push failed for $name - possibly empty, LFS issues, or size limit."
                else
                  log "Successfully mirrored: $name"
                fi
                cd ..
                rm -rf "$name.git"
              else
                log "Clone failed or repo is empty: $name"
              fi
            done

            page=$((page + 1))
          done

          log "Mirroring complete."
